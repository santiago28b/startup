<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>
    <link rel="stylesheet" href="employees.css">
    <link rel="icon" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

  </head>
  <body class="bg-primary text-light">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <header class="p-3 bg-primary text-white">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
          <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none" style="font-size: 30px;">
              JaniApp <sup>&reg;</sup> </a>
  
          <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
            <li><a href="index.html" class="nav-link px-2 text-white">Home</a></li>
            <li><a href="about.html" class="nav-link px-2 text-white">About</a></li>
            <li><a href="clients.html" class="nav-link px-2 text-white">Clients</a></li>
            <li><a href="employees.html" class="nav-link px-2 text-white">Employees</a></li>
          </ul>
  
          <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3">
            <input type="search" class="form-control form-control-dark" placeholder="Search..." aria-label="Search">
          </form>
  
          <div class="text-end">
            <button type="button" class="btn btn-outline-light me-2">Login</button>
            <button type="button" class="btn btn-warning">Sign-up</button>
          </div>
        </div>
      </div>
    </header>

    <main class="container-fluid bg-secondary text-center">
      <table class="table" id="show">
        <thead class="thead-dark">
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">Client</th>
            <th scope="col">phone Number</th>
          </tr>
        </thead>
      </table>
      <br>
      <table class="table table-striped">
        <thead>
            <th id="totalEmployee">Total number of employee</th>
              <th id="totalMoney">total pay</th>
        </thead>
        <tbody>
            <tr>
                <td id="empNum">3</td>
                <td id="empMoney">$4500</td>
            </tr>
        </tbody>
      </table>
      <button class="btn btn-primary" type="submit" onclick="openAddForm()">Add Employee</button>
      <button class="btn btn-primary" type="button" onclick="openRemoveForm()">Remove Employee</button>

      <div class="form-popup" id="addEmployeeForm">
        <form action="" class="form-container">
          <h1>Add Employee</h1>
          <label for="employee"><b>Employee</b></label>
          <input type="text" name="employee"  id="employee" placeholder="Jon Doe" required>
          <label for="amount"><b>Amount</b></label>
          <input type="text" name="amount" id="amount" placeholder="0" required>
          <label for="phone" name="phone" id="phoneLabel" aria-placeholder="000-000-0000"><b>Phone</b></label>
          <input type="tel" id="phone" name="phone" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
          <br>
          <button type="button" class="btn" value="Add" onclick="addRow(); update()"> Add </button>
      <button type="button" class="btn cancel" onclick="closeForm()">Close</button>
        </form>
      </div>

      <div class="form-popup" id="removeEmployeeForm">
        <form action="" class="form-container">
          <h1>Remove Employee</h1>
          <label for="cliente"><b>Employee</b></label>
        <input type="text" name="EmployeeID"  id="employeeID" placeholder="0" required>
      <button class="btn btn-primary" type="button" onclick="removeRow(document.getElementById('employeeID').value); update()">Remove</button>
      <button type="button" class="btn cancel" onclick="closeForm()">Close</button>
        </form>


      </div>

    </main>

    <footer>
      <hr>
      <span class="text-reset">Santiago Bolano</span>
      <br>
      <a href="https://github.com/santiago28b/startup" style="color: white;">GitHub</a>
    </footer>
  
    <script src="employee.js"></script>
    <script src="login.js"></script>
</body>
</html>

    <main class="container-fluid bg-secondary text-center">
     <!-- //here was the thing  -->
     <div id="welName">Hello</div>
      <table class="table" id="show">
        <thead class="thead-dark">
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">Amount</th>
            <th scope="col">Date</th>
          </tr>
        </thead>
      </table>

      <table class="table table-striped" >
        <thead>
          <tr>
            <th>Total number of clients</th>
              <th>total pay</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td id="totalClient">3</td>

            </tr>
        </tbody>

      <button class="btn btn-primary" type="submit" onclick="openAddForm()">Add Client</button>
      <button class="btn btn-primary" type="button" onclick="openRemoveForm()">Remove Client</button>
      
      <div class="form-popup" id="addClientForm">
      <form action="" class="form-container">
        <h1>Add Client</h1>
        <label for="cliente"><b>Client</b></label>
        <input type="text" name="cliente"  id="cliente" placeholder="Jon Doe" required>
        <label for="amount"><b>Amount</b></label>
        <input type="text" name="amount" id="amount" placeholder="0" required>
        <button type="button" class="btn" value="Add" onclick="addRow(); update()"> Add </button>
    <button type="button" class="btn cancel" onclick="closeForm()">Close</button>
      </form>
    </div>
    
    <div class="form-popup" id ="removeClientForm">
    <form action="" class="form-container">
      <h1>Remove Client</h1>
      <label for="cliente"><b>ClientID</b></label>
        <input type="text" name="clienteID"  id="clienteID" placeholder="0" required>
      <button class="btn btn-primary" type="button" onclick="removeRow(document.getElementById('clienteID').value); update()">Remove</button>
      <button type="button" class="btn cancel" onclick="closeForm()">Close</button>
    </form>
